name: Publish to PyPI

# Builds and publishes the package when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API tokens or secrets are stored.
# See RELEASING.md for the one-time PyPI setup and how to cut a release.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/polymarket-api-python
    permissions:
      id-token: write # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check distribution metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
